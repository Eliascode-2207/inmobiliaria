<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login - PISTONZONE</title>

    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <nav class="navbar">

            <a href="index.html" class="logo" style="display: flex; align-items: center; gap: 8px;">
                <!-- Icono de un estilo tuerca/motor básico en SVG -->
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#3498db" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                <span>PISTON<span style="color: #3498db;">ZONE</span></span>
            </a>

            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="index.html" class="nav-link">Inicio</a>
                </li>
                <li class="nav-item">
                    <a href="Servicios.html" class="nav-link">Servicios</a>
                </li>
                <li class="nav-item">
                    <a href="Portafolio.html" class="nav-link">Portafolio</a>
                </li>
                <li class="nav-item">
                    <a href="Contacto.html" class="nav-link">Contacto</a>
                </li>
                <li class="nav-item"><a href="login.html" class="nav-link">Login</a></li>
            </ul>

            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>

        </nav>
    </header>

    <!-- CONTENIDO PRINCIPAL: Login/Registro -->
    <main class="main-content">
        <section class="hero-video">
            <video class="hero-video__bg" autoplay muted loop playsinline>
                <source src="motovideo.mp4.mp4" type="video/mp4">
                Tu navegador no soporta video HTML5.
            </video>
            <div class="hero-video__overlay"></div>

            <div class="auth-container" style="position: relative; z-index: 2; height: auto; width: 100%;">
                <div class="auth-forms">

                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="mostrarFormulario('login')">Ingresar</button>
                    <button class="auth-tab" onclick="mostrarFormulario('registro')">Registrarse</button>
                </div>

                <!-- Formulario Inicio de Sesión -->
                <form id="form-login" class="auth-form active" onsubmit="iniciarSesion(event)">
                    <h2 class="section-title" style="font-size: 1.5rem; margin-bottom: 20px;">Iniciar Sesión</h2>
                    <div class="form-group">
                        <label>Correo Electrónico:</label>
                        <input type="email" placeholder="tu@correo.com" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña:</label>
                        <input type="password" placeholder="Ingresa tu contraseña" required>
                    </div>
                    <button type="submit" class="auth-submit">Entrar</button>
                </form>

                <!-- Formulario Registro -->
                <form id="form-registro" class="auth-form" onsubmit="registrar(event)">
                    <h2 class="section-title" style="font-size: 1.5rem; margin-bottom: 20px;">Crear Cuenta</h2>
                    <div class="form-group">
                        <label>Nombre Completo:</label>
                        <input type="text" placeholder="Ej: Daniel Isaza" required>
                    </div>
                    <div class="form-group">
                        <label>Correo Electrónico:</label>
                        <input type="email" placeholder="tu@correo.com" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña:</label>
                        <input type="password" placeholder="Crea una contraseña" required>
                    </div>
                    <button type="submit" class="auth-submit">Registrarse</button>
                </form>

            </div>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-bottom" style="border-top: none;"> <!-- Reducido el footer para que sea minimalista en el login -->
            © 2026 Pistonzone | Todos los derechos reservados
        </div>
    </footer>

    <script src="script.js"></script>

</body>

</html>
